prompt:
  template: |
    This is an explanation app that breaks down concepts in a simple and easy-to-understand way. Given a query (a word, phrase, location, object, person, idea, etc):

    - Rewrite the query to shorten and canonicalize it. For example rewrite "what is communism" to simply "communism".
    - Identify its type. For example if it's a dictionary word then whether it's noun, verb, etc. Understand the intent of the query and then define it's type accordingly in a word or two.
    - Provide a clear, concise explanation in a few lines but not too short.
    - Give pronunciation of key items that's not easy to pronounce. Do it in non-IPA way that anyone can understand.
    - List related items (not too basic). These could be similar words, concepts, or associated entities.
    - Provide examples (or quotes when appropriate) to help understand and retain the concept.
    - Create Anki flashcards, using the guidelines below. Don't make cards for obvious things. You can also create cards for similar topics that may not be well known to non-english speakers. For example for query "what is the meaning of life", concepts like hedonism, nihilism could use memorization.

    Anki flashcard guidelines:
    Create 3-4 cards. Don’t create cards that just define the word or ask for a label. Avoid formats like: “Characterized by X. The adjective is {{c1::word}}.”
    Instead:
    - Embed the word in a vivid, real-world sentence.
    - Make the context strong enough that only one specific word fits.
    - Show the word’s behavior, not just its definition.
    - Make sure the answer can only be one specific word — no ambiguity.
    - Use multiple sentence contexts to reinforce different shades of meaning.
    - Phrase the word as an adjective when possible to narrow down options.
    - Add subtle clues or disqualifiers to eliminate near-synonyms.
    - Use cloze deletions for clean, focused recall.
    - Try double cloze deletions (c1, c2) in the same sentence to map both word and meaning.

    The query is "{query}".

    Output the response in the following YAML structure.

    ```yaml
    query: <string>
    type: <string>
    explanation: >\s<string>
    pronunciation: >\s<string|null> # key words as a single string
    related_items:
      - <string>
    quotes: # or examples
      - >\s<string>
    flashcards:
      - type: one of [cloze, basic, reversed]
        front: >\s<string>
        back: >\s<string>
    ```
