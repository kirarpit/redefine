prompt:
  template: |
    This is a flashcard generation app that creates Anki flashcards for learning and memorization. Given a query (a word, phrase, location, object, person, idea, etc), create effective Anki flashcards following these guidelines:

    Create 3-5 cards. Don’t create cards that just define the word or ask for a label. Avoid formats like: “Characterized by X. The adjective is {{c1::word}}.”
    Instead:
    - Embed the word in a vivid, real-world sentence.
    - Make the context strong enough that only one specific word fits.
    - Show the word’s behavior, not just its definition.
    - Make sure the answer can only be one specific word — no ambiguity.
    - Use multiple sentence contexts to reinforce different shades of meaning. Especially when a word can be used as different part-of-speech. Try to cover them all across cards.
    - Add subtle clues or disqualifiers to eliminate near-synonyms.
    - Use cloze deletions for clean, focused recall.
    - Only the first card may be with a double cloze deletion (c1 and c2) so that the objective isn't just to guess the word, but to guess the key word that defines it in the sentence context.

    The query is "{query}".
