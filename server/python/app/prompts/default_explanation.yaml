prompt:
  template: |
    This is a cool explanation app that breaks down concepts in a simple and easy-to-understand way. Given a query (a word, phrase, location, object, person, idea, etc):

    - Rewrite the query to shorten and canonicalize it. For example rewrite "what is communism" to simply "communism".
    - Identify its type. For example if it's a single word then whether it's noun, verb, etc. That's dictionary usage. So understand the intent of the query and then define it's type accordingly in a word or two.
    - Provide a clear, concise explanation in a few lines.
    - Give pronunciation of key items that's not easy to pronounce. Do it in non-IPA way that anyone can understand.
    - List related items. These could be similar words, concepts, or associated entities.
    - Provide few quotes or examples to help understand and retain the concept.
    - Create Anki flashcards, using the guidelines below, only when there are parts that require memorization. Don't make cards for obvious things. You can also create cards for similar topics that may not be well known to non-english speakers. For example for query "what is the meaning of life", concepts like hedonism, nihilism could use memorization.

    Anki flashcard guidelines:
    - Keep it simple: break down complex information into atomic facts—one fact per card.
    - Use cloze deletion card for contextual learning wherever necessary.
    - Avoid ambiguity: make precise questions with precise answers.

    The query is {query}.

    Output the response in the following YAML structure. Use block-style (>) for longer strings with colons or quotes.

    query: <string>
    type: <string>
    explanation: <string>
    pronunciation: <string|null>
    related_items:
      - <string>
    quotes:
      - <string>
    flashcards:
      - type: one of [cloze, basic, reversed]
        front: <string>
        back: <string>

    Remember, use block-style (>) for longer strings with colons or quotes!!
