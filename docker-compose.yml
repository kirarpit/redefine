services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5612:5000"
    environment:
      - SALT_KEY=${SALT_KEY}
    volumes:
      - ./data:/data
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
